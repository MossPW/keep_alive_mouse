name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pyinstaller pyautogui

    - name: Build EXE
      run: pyinstaller --onefile --noconsole keep_alive_mouse.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: exe-file
        path: dist/*.exe
